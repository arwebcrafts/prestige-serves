<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prestige Serves — Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages/admin.css">
</head>
<body class="admin-login-body">

<div class="admin-login-container">
  <div class="admin-login-card">
    <div class="admin-login-header">
      <img src="assets/images/mail.png" alt="Prestige Serves" style="width:60px;height:60px;object-fit:contain;">
      <h1>Admin Login</h1>
      <p>Prestige Serves Management</p>
    </div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" required>
      </div>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn-navy">Login</button>
    </form>
  </div>
</div>

<script>
function handleLogin(event) {
  event.preventDefault();
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  
  // Simple preset credentials - in production use proper auth
  if (username === 'prestigeservesllc' && password === 'prestigeservesllc123') {
    sessionStorage.setItem('adminLoggedIn', 'true');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('login-error').textContent = 'Invalid credentials';
    document.getElementById('login-error').style.display = 'block';
  }
}
</script>
</body>
</html>
